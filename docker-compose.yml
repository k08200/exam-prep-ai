services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-examprep_db}
      POSTGRES_USER: ${POSTGRES_USER:-examprep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examprep_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-examprep} -d ${POSTGRES_DB:-examprep_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5434}:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-examprep}:${POSTGRES_PASSWORD:-examprep_password}@db:5432/${POSTGRES_DB:-examprep_db}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-32chars}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-opus-4.8}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Exam Prep AI}
      USE_MOCK_CLAUDE: ${USE_MOCK_CLAUDE:-true}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      MAX_USER_STORAGE_BYTES: ${MAX_USER_STORAGE_BYTES:-2147483648}
      MAX_ANALYSIS_INPUT_CHARS: ${MAX_ANALYSIS_INPUT_CHARS:-600000}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      THINKING_BUDGET_ANALYSIS: ${THINKING_BUDGET_ANALYSIS:-30000}
      THINKING_BUDGET_GENERATION: ${THINKING_BUDGET_GENERATION:-10000}
      CLAUDE_THINKING_EFFORT: ${CLAUDE_THINKING_EFFORT:-high}
      MAX_UPLOAD_FILES: ${MAX_UPLOAD_FILES:-10}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-false}
      MATERIAL_PROCESSING_STALE_MINUTES: ${MATERIAL_PROCESSING_STALE_MINUTES:-30}
      ANALYSIS_RUN_STALE_MINUTES: ${ANALYSIS_RUN_STALE_MINUTES:-30}
      EXAM_GENERATION_STALE_MINUTES: ${EXAM_GENERATION_STALE_MINUTES:-30}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-60}
      AUTH_RATE_LIMIT_MAX_FAILURES: ${AUTH_RATE_LIMIT_MAX_FAILURES:-5}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-300}
      AI_STREAM_HEARTBEAT_SECONDS: ${AI_STREAM_HEARTBEAT_SECONDS:-15}
      AI_STREAM_EVENT_TIMEOUT_SECONDS: ${AI_STREAM_EVENT_TIMEOUT_SECONDS:-180}
      MAX_DAILY_AI_ANALYSES: ${MAX_DAILY_AI_ANALYSES:-10}
      MAX_DAILY_AI_GENERATED_QUESTIONS: ${MAX_DAILY_AI_GENERATED_QUESTIONS:-200}
      MAX_DAILY_AI_GRADES: ${MAX_DAILY_AI_GRADES:-300}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:${FRONTEND_PORT:-3003},http://127.0.0.1:${FRONTEND_PORT:-3003}}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-3003}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
