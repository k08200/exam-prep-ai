name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          ANTHROPIC_API_KEY: ""
          USE_MOCK_CLAUDE: "true"
          UPLOAD_DIR: /tmp/test-uploads
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./browser_e2e.db
          ENVIRONMENT: development
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          ANTHROPIC_API_KEY: ""
          USE_MOCK_CLAUDE: "true"
          UPLOAD_DIR: /tmp/e2e-uploads
          AUTO_CREATE_TABLES: "true"
          CORS_ORIGINS: http://127.0.0.1:3004,http://localhost:3004
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8002 > /tmp/exam-prep-backend.log 2>&1 &
          echo $! > /tmp/exam-prep-backend.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8002/health && exit 0
            sleep 1
          done
          cat /tmp/exam-prep-backend.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8002
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm run dev -- --hostname 127.0.0.1 --port 3004 > /tmp/exam-prep-frontend.log 2>&1 &
          echo $! > /tmp/exam-prep-frontend.pid
          for i in {1..30}; do
            curl -fsS -I http://127.0.0.1:3004/auth/register && exit 0
            sleep 1
          done
          cat /tmp/exam-prep-frontend.log
          exit 1

      - name: Run browser E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:3004
        run: npm run e2e

      - name: Collect E2E logs
        if: failure()
        run: |
          mkdir -p frontend/test-results/logs
          cp /tmp/exam-prep-backend.log frontend/test-results/logs/backend.log || true
          cp /tmp/exam-prep-frontend.log frontend/test-results/logs/frontend.log || true

      - name: Upload browser traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: browser-e2e-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report

  docker-compose-check:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate docker-compose
        run: docker compose config --quiet
